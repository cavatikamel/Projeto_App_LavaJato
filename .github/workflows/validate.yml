name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check app syntax
        run: node --check app/main.js

      - name: Check sync script syntax
        run: node --check scripts/sync-fipe-local-db.mjs

      - name: Verify required files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f app/index.html
          test -f app/styles.css
          test -f app/main.js
